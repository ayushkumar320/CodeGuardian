# Private repository, with the Groq provider.
# Settings -> Secrets and variables -> Actions:  add GROQ_API_KEY (or HF_TOKEN).
# A model key is REQUIRED — without one, non-fork PRs are not analyzed.
name: CodeGuardian Risk
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  checks: write
  issues: write
  actions: read
concurrency:
  group: codeguardian-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  risk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: ayushkumar320/CodeGuardian@v0
        with:
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
