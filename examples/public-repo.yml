# Minimal CodeGuardian setup for a public repository.
# Drop this file in at .github/workflows/codeguardian.yml. A model key is
# REQUIRED — add GROQ_API_KEY (or HF_TOKEN) under Settings -> Secrets and
# variables -> Actions, and pass it to the step (see private-repo-with-groq.yml).
name: CodeGuardian Risk
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
permissions:
  contents: write       # write only for the optional codeguardian-memory branch
  pull-requests: write
  checks: write
  issues: write
  actions: read
concurrency:
  group: codeguardian-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  risk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: ayushkumar320/CodeGuardian@v0
