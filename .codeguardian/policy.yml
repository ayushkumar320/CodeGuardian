# CodeGuardian policy. Unknown keys are ignored.

# Blocking mode: advisory | guarded | strict.
# advisory  = never blocks merge (gradual rollout, week 1)
# guarded   = blocks High and Critical
# strict    = blocks High and Critical, no soft override
mode: advisory

# Score thresholds (0-10) that define risk levels.
thresholds:
  medium: 3.1
  high: 6.1
  critical: 8.6

# Bot-noise budgets.
noise:
  max_findings_check: 3
  max_findings_comment: 5
  comment_on_medium: true
  allow_inline_annotations: false
  skip_comment_for_docs_only: true

# Architecture rules.
architecture:
  detect_circular: true
  forbidden_imports: []
    # - paths: "**/components/**"
    #   cannot_import: "server"
    #   reason: "UI components must not import server-only code"
  layers: []
    # - name: ui
    #   paths: "**/ui/**"
    #   may_import: ["shared"]      # ui may only import shared (+ itself)
    # - name: data
    #   paths: "**/data/**"

# Map source paths to the test suite a reviewer should run.
test_suite_mappings: []
  # - paths: "**/billing/**"
  #   suite: "billing-integration"

# Suggest reviewers for changes under certain paths (read alongside CODEOWNERS).
service_owners: []
  # - paths: "**/prisma/**"
  #   owners: ["@platform/db"]

# Model provider (Groq -> Hugging Face -> deterministic).
# CodeGuardian runs zero-key by default: deterministic analysis owns the score
# and findings, and a model (if a token is set) only rephrases the summary.
# Set require_model if you WANT a guarantee the LLM summary ran — a missing
# token is then surfaced as a loud "degraded" warning instead of a silent
# fallback. This stays opt-in: the default product never needs a token.
model:
  require_model: false       # true = warn when no GROQ_API_KEY / HF_TOKEN
  block_when_missing: false  # true = also fail the check (needs require_model)

# GitHub-native memory (Phase 5). Compact records persist on a repo branch so
# CodeGuardian can answer "has this happened before?" across PRs.
memory:
  enabled: true
  branch: codeguardian-memory
  max_results: 3
  min_similarity: 0.34

# Finding IDs to pre-suppress (kept visible in the summary, excluded from score).
ignored_findings: []
  # - CG-DB-002

# Glob patterns treated as high-risk (raises severity / blast radius).
high_risk_paths:
  - "**/migrations/**"
  - "**/prisma/schema.prisma"
  - "**/auth/**"
  - "**/billing/**"
  - "**/api/**"
  - "**/*.types.ts"
