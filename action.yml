name: "CodeGuardian AI"
description: "Know what breaks before you merge. GitHub-native pre-merge PR risk checker."
author: "CodeGuardian"
branding:
  icon: "shield"
  color: "blue"

inputs:
  groq-api-key:
    description: "Groq API key (preferred). REQUIRED unless hf-token is set; without either, non-fork PRs are not analyzed."
    required: false
    default: ""
  hf-token:
    description: "Hugging Face token (alternative to groq-api-key; also embeddings). One model key is required."
    required: false
    default: ""
  github-token:
    description: "Token used to publish the check and PR comment."
    required: false
    default: ${{ github.token }}
  python-version:
    description: "Python version to run CodeGuardian with."
    required: false
    default: "3.11"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install CodeGuardian
      shell: bash
      # Reproducible install (Phase 11): deps come from the pinned lockfile, then
      # the action's own package is installed --no-deps so no live PyPI resolution
      # happens at run time.
      run: |
        pip install --quiet --disable-pip-version-check \
          -r "${{ github.action_path }}/requirements.lock"
        pip install --quiet --disable-pip-version-check --no-deps \
          "${{ github.action_path }}"

    - name: Run CodeGuardian
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        HF_TOKEN: ${{ inputs.hf-token }}
        CODEGUARDIAN_OUT: ${{ runner.temp }}/codeguardian
      run: python -m codeguardian

    - name: Upload report artifacts
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: codeguardian-report
        path: ${{ runner.temp }}/codeguardian/codeguardian-report.*
        if-no-files-found: ignore
