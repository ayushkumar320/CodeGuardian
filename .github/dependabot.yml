version: 2
updates:
  # Keep GitHub Actions SHA pins current (Dependabot updates the pinned SHA
  # while preserving the human-readable version comment).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels: ["dependencies", "security"]

  # Python dependencies (pyproject).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels: ["dependencies"]
