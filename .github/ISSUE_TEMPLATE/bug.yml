name: Bug report
description: CodeGuardian crashed, hung, posted broken output, or otherwise misbehaved
title: "[Bug] <short description>"
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: What did you do and what went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: input
    id: run_link
    attributes:
      label: Failing Actions run (link)
      description: Settings -> Actions -> the failing run. Public repos preferred.

  - type: textarea
    id: logs
    attributes:
      label: Relevant log lines
      description: Paste the failing job step's log. Remove any secrets first.
      render: text

  - type: input
    id: version
    attributes:
      label: CodeGuardian version
      placeholder: v0
