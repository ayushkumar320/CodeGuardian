name: CodeGuardian Risk

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write   # write needed only for the codeguardian-memory branch (Phase 5)
  pull-requests: write
  checks: write
  issues: write
  actions: read

concurrency:
  group: codeguardian-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  risk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: CodeGuardian
        uses: ./
        with:
          # Optional — absence triggers the next fallback (Groq -> HF -> deterministic).
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          hf-token: ${{ secrets.HF_TOKEN }}
