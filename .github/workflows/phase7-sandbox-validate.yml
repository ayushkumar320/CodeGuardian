name: Phase 7 Sandbox Validate

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Sandbox repo in owner/name form"
        required: true
      pr:
        description: "Pull request number to validate"
        required: true
      expect_sticky:
        description: "Expect a sticky summary comment"
        required: false
        default: "true"
      command_body:
        description: "Optional PR command to post and verify, e.g. @codeguardian tests"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  checks: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Verify PR surfaces
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=()
          if [ "${{ inputs.expect_sticky }}" = "true" ]; then
            args+=(--expect-sticky)
          fi
          python e2e/validate_sandbox.py verify-pr \
            --repo "${{ inputs.repo }}" \
            --pr "${{ inputs.pr }}" \
            "${args[@]}"

      - name: Verify command reply
        if: ${{ inputs.command_body != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python e2e/validate_sandbox.py send-command \
            --repo "${{ inputs.repo }}" \
            --pr "${{ inputs.pr }}" \
            --body "${{ inputs.command_body }}"
