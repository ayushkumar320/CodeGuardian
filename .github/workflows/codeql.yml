name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    # Dependabot PRs run with a read-only GITHUB_TOKEN, so the SARIF upload
    # (security-events: write) can't succeed there. Skip them — the same code is
    # scanned on push to main when the PR merges.
    if: github.actor != 'dependabot[bot]'
    permissions:
      security-events: write  # upload CodeQL results
      actions: read           # CodeQL reads the workflow run (get-a-workflow-run)
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
