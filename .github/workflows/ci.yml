name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install (with dev deps)
        run: pip install -e ".[dev]"
      - name: Run tests (integration fixtures build real git repos)
        run: pytest -q

  lockfile:
    # The Action installs from requirements.lock for reproducibility (Phase 11);
    # regenerate it whenever pyproject.toml deps change and commit the result.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Verify requirements.lock is in sync with pyproject.toml
        # Regenerate the lockfile in place (so pip-compile's autogen comment
        # records the same output path the committed file does) and let `git
        # diff` decide whether the content actually changed.
        run: |
          pip install --quiet pip-tools
          pip-compile --strip-extras --quiet --output-file=requirements.lock pyproject.toml
          if ! git diff --quiet -- requirements.lock; then
            echo "::error::requirements.lock is out of sync with pyproject.toml; run: pip-compile --strip-extras --output-file=requirements.lock pyproject.toml"
            git --no-pager diff -- requirements.lock
            exit 1
          fi

  action-smoke:
    # Validates the packaged Action runs in deterministic mode with no keys.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run CodeGuardian Action (deterministic, no secrets)
        uses: ./
